<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ARSLAN-MD WhatsApp Bot - Fast, Reliable & Feature Rich">
  <meta name="keywords" content="whatsapp bot, Arslan, Arslan-xd, whatsapp automation">
  <title>KIRA-MD | WhatsApp Automation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="https://files.catbox.moe/16i1l7.jpg" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --neon-blue: #00f3ff;
      --neon-pink: #ff00ff;
      --neon-green: #00ff9d;
      --neon-purple: #9d00ff;
      --neon-orange: #ff6b00;
      --neon-yellow: #ffde00;
      --dark-1: #0a0a0f;
      --dark-2: #12121b;
      --dark-3: #1a1a27;
      --light: #ffffff;
      --gray: #8a8aa3;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --gradient-1: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      --gradient-2: linear-gradient(135deg, var(--neon-pink), var(--neon-orange));
      --gradient-3: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
      --gradient-4: linear-gradient(135deg, var(--neon-yellow), var(--neon-pink));
      --gradient-bg: radial-gradient(circle at 20% 30%, #0a0a0f 0%, #12121b 40%, #1a1a27 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--gradient-bg);
      font-family: 'Poppins', sans-serif;
      color: var(--light);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Matrix Background */
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      opacity: 0.03;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--neon-blue) 2px,
        var(--neon-blue) 4px
      );
    }

    /* Cyber Grid */
    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(var(--neon-blue) 1px, transparent 1px),
        linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 70%);
      z-index: -1;
      opacity: 0.05;
    }

    /* Scanning Line */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
      box-shadow: 0 0 15px var(--neon-green);
      z-index: 1000;
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Neon Header */
    .neon-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px 40px;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .holographic-logo {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      background: var(--gradient-1);
      animation: rotateHue 10s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px var(--neon-blue);
    }

    @keyframes rotateHue {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .holographic-logo img {
      width: 80%;
      height: 80%;
      border-radius: 10px;
      object-fit: cover;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink), var(--neon-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-link {
      color: var(--gray);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--gradient-1);
      transition: left 0.5s ease;
      z-index: -1;
    }

    .nav-link:hover {
      color: white;
      transform: translateY(-2px);
    }

    .nav-link:hover::before {
      left: 0;
    }

    /* Holographic Terminal */
    .terminal-container {
      max-width: 800px;
      margin: 150px auto 50px;
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 25px;
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 0 50px rgba(0, 243, 255, 0.2),
        inset 0 0 50px rgba(0, 243, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    .terminal-header {
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
    }

    .terminal-dots {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28ca42; }

    .terminal-body {
      padding: 40px;
    }

    /* Status Display */
    .status-display {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(0, 243, 255, 0.05);
      border-radius: 15px;
      border: 1px solid rgba(0, 243, 255, 0.2);
    }

    .pulse-circle {
      width: 15px;
      height: 15px;
      background: var(--neon-green);
      border-radius: 50%;
      position: relative;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(0, 255, 157, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
    }

    .status-text {
      font-size: 1.1rem;
      color: var(--neon-green);
      font-weight: 500;
    }

    /* Holographic Stats */
    .holographic-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(0, 243, 255, 0.1), rgba(157, 0, 255, 0.1));
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-1);
    }

    .stat-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 5px;
      text-shadow: 0 0 20px currentColor;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Command Terminal */
    .command-terminal {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 40px;
      border: 1px solid rgba(0, 243, 255, 0.2);
    }

    .terminal-prompt {
      font-family: 'JetBrains Mono', monospace;
      color: var(--neon-green);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .command-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .command-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px 15px;
      border-radius: 10px;
      border-left: 3px solid var(--neon-blue);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .command-item:hover {
      background: rgba(0, 243, 255, 0.1);
      transform: translateX(5px);
    }

    /* Holographic Buttons */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .holographic-btn {
      padding: 18px 25px;
      border: none;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .holographic-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.7s ease;
    }

    .holographic-btn:hover::before {
      left: 100%;
    }

    .holographic-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 243, 255, 0.3);
    }

    .btn-primary {
      background: var(--gradient-1);
    }

    .btn-secondary {
      background: var(--gradient-2);
    }

    .btn-tertiary {
      background: var(--gradient-3);
    }

    .btn-quaternary {
      background: var(--gradient-4);
    }

    /* Music Control Panel */
    .music-panel {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
    }

    .music-orb {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(0, 243, 255, 0.5);
      animation: float 6s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .music-orb::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent);
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .music-orb i {
      font-size: 1.8rem;
      color: white;
      z-index: 2;
    }

    .equalizer-waves {
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 20px;
      display: flex;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .equalizer-waves.active {
      opacity: 1;
    }

    .wave {
      width: 4px;
      height: 10px;
      background: var(--neon-blue);
      border-radius: 2px;
      animation: wave 1s infinite ease-in-out;
    }

    .wave:nth-child(1) { animation-delay: 0.1s; }
    .wave:nth-child(2) { animation-delay: 0.2s; }
    .wave:nth-child(3) { animation-delay: 0.3s; }
    .wave:nth-child(4) { animation-delay: 0.4s; }
    .wave:nth-child(5) { animation-delay: 0.5s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1.5); }
    }

    /* Contact Panel */
    .contact-panel {
      position: fixed;
      bottom: 30px;
      left: 30px;
      z-index: 100;
    }

    .contact-orb {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--gradient-2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
      animation: pulseGlow 4s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.5); }
      50% { box-shadow: 0 0 60px rgba(255, 0, 255, 0.8); }
    }

    .contact-orb i {
      font-size: 1.8rem;
      color: white;
    }

    .contact-expand {
      position: absolute;
      bottom: 80px;
      left: 0;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 25px;
      width: 300px;
      border: 1px solid var(--glass-border);
      display: none;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .contact-expand.active {
      display: flex;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(10px);
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .whatsapp { background: #25D366; }
    .telegram { background: #0088cc; }
    .github { background: #333; }
    .email { background: #EA4335; }

    /* Holographic Footer */
    .holographic-footer {
      text-align: center;
      padding: 30px;
      margin-top: 40px;
      border-top: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }

    .footer-text {
      font-size: 1rem;
      color: var(--gray);
    }

    .footer-text a {
      color: var(--neon-blue);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .footer-text a:hover {
      text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Particle System */
    .particle-system {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: var(--neon-blue);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Neon Glow Text */
    .neon-glow {
      text-shadow: 
        0 0 10px currentColor,
        0 0 20px currentColor,
        0 0 40px currentColor;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .neon-header {
        padding: 15px 20px;
      }
      
      .nav-links {
        display: none;
      }
      
      .terminal-container {
        margin: 120px 20px 50px;
      }
      
      .terminal-body {
        padding: 25px;
      }
      
      .holographic-stats {
        grid-template-columns: 1fr;
      }
      
      .button-grid {
        grid-template-columns: 1fr;
      }
      
      .music-panel, .contact-panel {
        bottom: 20px;
        right: 20px;
      }
      
      .contact-panel {
        left: 20px;
      }
      
      .contact-expand {
        width: calc(100vw - 40px);
      }
    }

    /* Loading Animation */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--dark-1);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader {
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top: 4px solid var(--neon-blue);
      border-right: 4px solid var(--neon-pink);
      border-bottom: 4px solid var(--neon-green);
      border-left: 4px solid var(--neon-purple);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--dark-2);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gradient-1);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gradient-2);
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
  </div>

  <!-- Background Effects -->
  <div class="matrix-bg"></div>
  <div class="cyber-grid"></div>
  <div class="scan-line"></div>
  <div class="particle-system" id="particleSystem"></div>

  <!-- Neon Header -->
  <header class="neon-header">
    <div class="logo-container">
      <div class="holographic-logo">
        <img src="https://n.uguu.se/BlGoHUJU.jpg" alt="KIRA-MD">
      </div>
      <div class="logo-text">KIRA-MD</div>
    </div>
    <nav class="nav-links">
      <a href="#terminal" class="nav-link">TERMINAL</a>
      <a href="#stats" class="nav-link">STATS</a>
      <a href="#commands" class="nav-link">COMMANDS</a>
      <a href="#github" class="nav-link">GITHUB</a>
    </nav>
  </header>

  <!-- Main Terminal -->
  <div class="terminal-container" id="terminal">
    <div class="terminal-header">
      <div class="terminal-title">KIRA-MD_BOT_TERMINAL</div>
      <div class="terminal-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
    </div>
    
    <div class="terminal-body">
      <!-- Status -->
      <div class="status-display">
        <div class="pulse-circle"></div>
        <div class="status-text">SYSTEM STATUS: ONLINE • PERFORMANCE: OPTIMAL • CONNECTIONS: ACTIVE</div>
      </div>

      <!-- Holographic Stats -->
      <div class="holographic-stats" id="stats">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-server"></i></div>
          <div class="stat-value neon-glow" style="color: var(--neon-blue);" id="uptime">99.99%</div>
          <div class="stat-label">UPTIME</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-bolt"></i></div>
